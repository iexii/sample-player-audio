<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Preview</title>
    <!-- Link to the CSS file -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="waveform-container">
        <h3 id="sample-title">Stellar Drift - Sample Preview</h3>
        <!-- The WaveSurfer will draw its waveform inside this empty div -->
        <div id="waveform"></div>
    </div>
    <!-- Link the WaveSurfer library from a CDN (this is safe) -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <!-- Link the script that runs the logic -->
    <script src="script.js"></script>
</body>
</html>
